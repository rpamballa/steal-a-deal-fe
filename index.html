<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Steal A Deal — Browse Used Cars Online & Buy Without the Dealership Pressure</title>
    <meta
      name="description"
      content="Browse thousands of dealer-verified used cars with transparent pricing, instant payment estimates, and trade-in offers. No pressure, no haggling. Start browsing free — sign up only when you're ready to buy."
    />
    <meta
      name="keywords"
      content="used cars, buy a car online, browse car inventory, dealer cars, car deals, transparent car pricing, trade-in value, test drive booking, no-haggle car buying, car marketplace"
    />
    <meta name="author" content="Steal A Deal" />
    <meta name="application-name" content="Steal A Deal" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#6366F1" />
    <link rel="canonical" href="https://www.stealadeal.com/" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Steal A Deal" />
    <meta
      property="og:title"
      content="Steal A Deal — Find Your Next Car Without the Dealership Noise"
    />
    <meta
      property="og:description"
      content="Thousands of dealer-verified cars, transparent pricing, instant payment estimates, and real trade-in offers. Browse free — no account needed to look."
    />
    <meta property="og:url" content="https://www.stealadeal.com/" />
    <meta property="og:image" content="https://www.stealadeal.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Steal A Deal — browse used cars online" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Steal A Deal — Browse Used Cars Online" />
    <meta
      name="twitter:description"
      content="Dealer-verified cars, transparent pricing, instant payment estimates and trade-in offers. Browse free; sign up when you're ready."
    />
    <meta name="twitter:image" content="https://www.stealadeal.com/og-image.png" />

    <!-- Structured data: Organization + site search -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://www.stealadeal.com/#org",
            "name": "Steal A Deal",
            "url": "https://www.stealadeal.com/",
            "description": "An online car marketplace where buyers browse dealer-verified inventory with transparent pricing, instant payment estimates, and trade-in offers — without dealership pressure.",
            "slogan": "Find the right car, without the dealership noise."
          },
          {
            "@type": "WebSite",
            "@id": "https://www.stealadeal.com/#website",
            "url": "https://www.stealadeal.com/",
            "name": "Steal A Deal",
            "publisher": {"@id": "https://www.stealadeal.com/#org"},
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://www.stealadeal.com/?view=inventory&q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Crawlable content for search engines and link previews (SPA hydrates over this) -->
    <noscript>
      <main style="max-width: 760px; margin: 3rem auto; padding: 0 1.25rem; font-family: 'Segoe UI', system-ui, sans-serif; color: #0F172A;">
        <h1>Steal A Deal — Browse Used Cars Online, No Dealership Pressure</h1>
        <p>
          Steal A Deal is an online car marketplace built for buyers and
          enthusiasts who want to shop on their own terms. Browse thousands of
          dealer-verified used cars with transparent, all-in pricing — no
          hidden fees, no haggling, no salesperson hovering.
        </p>
        <h2>Why car shoppers use Steal A Deal</h2>
        <ul>
          <li><strong>Browse free, no account required</strong> — explore the full live inventory and compare cars before you ever sign up.</li>
          <li><strong>Transparent pricing</strong> — see the real out-the-door price, taxes, and fees on every listing.</li>
          <li><strong>Instant payment estimates</strong> — adjust down payment, term, and credit band to see your monthly payment in seconds.</li>
          <li><strong>Real trade-in offers</strong> — get a value for your current car as part of the deal.</li>
          <li><strong>Test drives &amp; home delivery</strong> — book a test drive or arrange delivery from dealers near you.</li>
          <li><strong>Side-by-side compare</strong> — line up to three cars on price, mileage, and specs.</li>
        </ul>
        <h2>How it works</h2>
        <ol>
          <li>Browse live, dealer-verified inventory — no sign-up needed.</li>
          <li>Compare cars and estimate your monthly payment.</li>
          <li>Create a free account when you're ready to message a dealer, book a test drive, or start your purchase.</li>
          <li>Complete the deal online with transparent pricing and a tracked, step-by-step checkout.</li>
        </ol>
        <p>
          <a href="/?view=inventory" style="color: #6366F1; font-weight: 700;">Browse the car inventory &rarr;</a>
        </p>
      </main>
    </noscript>

    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
